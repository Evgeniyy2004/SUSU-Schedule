syntax = "proto3";

package common;

option java_package = "edu.java.grpc.common";
option java_multiple_files = true;

message Lesson {
    string subject = 1;
    string time = 2;
    string classroom = 3;
}

message LessonResponse {
    string day = 1;
    repeated Lesson lessons = 2;
}

message ScheduleResponse {
    repeated LessonResponse schedule = 1;
}

message IdRequest {
    int64 id = 1;
}

message BooleanResponse {
    bool value = 1;
}
