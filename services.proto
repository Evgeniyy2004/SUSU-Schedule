syntax = "proto3";
import "classes.proto";
import "google/protobuf/empty.proto";

package model;

service ScheduleInfo {
    rpc getSchedule(ScheduleRequest) returns (ScheduleResponse);
}


service SettingsInfo {
    rpc getMailing(StudentId) returns (IsEnabled);
    rpc updateMailing(Mailing) returns (google.protobuf.Empty);

    rpc checkGroup(StudentId) returns (IsEnabled);
    rpc updateGroup(Group) returns (google.protobuf.Empty);

    rpc getNotification(StudentId) returns (IsEnabled);
    rpc updateNotification(NotificationSettings) returns (google.protobuf.Empty);
}
